<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日方舟-卫戍协议</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 左侧面板 -->
        <div class="left-panel">

        
            <!-- 盟约信息区域 -->
            <div class="covenant-info" id="covenantInfo">
                <div class="empty-state">请选择一个盟约查看详细信息</div>
            </div>
            
            <!-- 干员列表区域 -->
            <div class="operators-section" id="operatorsSection">
                <h3>干员列表</h3>
                <div class="empty-state">请选择一个盟约查看相关干员</div>
            </div>
        </div>
        
        <!-- 右侧盟约列表 -->
        <div class="right-panel">
            
            <!-- 搜索模块 -->
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="搜索干员..." oninput="handleSearch(event)">
                <span id="clearSearch" class="clear-search" onclick="clearSearch()">×</span>
                <span class="search-icon">🔍</span>
            </div>

            <h3>盟约列表</h3>
            <div class="covenant-list" id="covenantList"></div>
        </div>
    </div>
    
    <!-- 关键词联动的悬浮提示框 -->
    <div id="keywordTooltip" class="keyword-tooltip"></div>

    <script src="js/main.js"></script>

    
</body>
</html>
